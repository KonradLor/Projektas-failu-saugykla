# ==============================================================================
#  KonradVault – Nginx konfigūracija
#  Oracle Cloud Always Free (ARM Ubuntu 22.04)
#
#  DIEGIMAS:
#    sudo cp deployment/nginx.conf /etc/nginx/sites-available/konradvault
#    sudo ln -sf /etc/nginx/sites-available/konradvault \
#                /etc/nginx/sites-enabled/konradvault
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  STRUKTŪRA:
#    [klientas] ──HTTPS──► [Nginx :443] ──HTTP──► [Uvicorn :8000]
#    Nginx tarnauja statiniams failams (HTML/CSS/JS) tiesiogiai
#    API užklausos perduodamos FastAPI (reverse proxy)
#    /share/{token} URL'ai nukreipiami į share.html
#
#  PASTABA – limit_req_zone direktyvos:
#    Šios direktyvos turi būti http {} bloke (ne server {} bloke).
#    Nginx 1.18+ palaiko jas sites-available faile, bet kai kurios distribucijos
#    reikalauja perkelti į /etc/nginx/conf.d/ratelimit.conf.
#    Jei `nginx -t` praneša „limit_req_zone is not allowed here" – perkelkite
#    šiuos blokus į konf.d katalogą.
# ==============================================================================


# ── Rate limiting zonos (apsauga nuo brute-force) ──────────────────────────────
# Lentelė: $binary_remote_addr → klientų skaičius / sekundę
# 10m zona = ~160000 skirtingų IP adresų atminty (~1KB / 10 IP)

# Login/registracijos zona – griežtas limitas (apsauga nuo TOTP brute-force)
# 5 užklausos / sekundę / IP, burst 10 (greitos retry'ės leidžiamos, bet ne ilgam)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Bendra API zona – švelnesnė (normalūs vartotojai gali daryti daugiau užklausų)
# 30 r/s / IP, burst 60
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;


# ── Upstream: FastAPI / Uvicorn ────────────────────────────────────────────────
upstream konradvault_api {
    server 127.0.0.1:8000;

    # Keepalive ryšiai į Uvicorn – sumažina TCP handshake sąnaudas
    keepalive 32;
}


# ── HTTP → HTTPS nukreipimas ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name _;   # Priimame bet kokį hostname (Oracle IP be domeno)

    # Visas HTTP srautas nukreipiamas į HTTPS
    return 301 https://$host$request_uri;
}


# ── Pagrindinis HTTPS serveris ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name _;

    # ── SSL sertifikatai (self-signed, sugeneruoti sesijos #001 metu) ──────────
    ssl_certificate     /etc/ssl/konradvault/konradvault.crt;
    ssl_certificate_key /etc/ssl/konradvault/konradvault.key;

    # TLS 1.2 ir 1.3 – senesni protokolai išjungti (saugumas)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Stiprūs cipher'iai – silpni išjungti
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # SSL sesijų kešas – greičiau naujoms SSL jungtims
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Saugumo antraštės ──────────────────────────────────────────────────────
    # HSTS – naršyklė visada naudos HTTPS (max-age=1 metai)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Clickjacking apsauga
    add_header X-Frame-Options "DENY" always;

    # MIME sniffing apsauga
    add_header X-Content-Type-Options "nosniff" always;

    # XSS filtras (legacy, bet dar naudingas)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer kontrolė
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy – išjungiame nereikalingus browser'io API
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Bendri nustatymai ──────────────────────────────────────────────────────
    # Serverio versija nerodoma klaidų puslapiuose
    server_tokens off;

    # Maksimalus užklausos dydis – 510MB (500MB failas + multipart overhead)
    client_max_body_size 510M;

    # Timeout'ai (didelių failų upload'ui)
    client_body_timeout    300s;
    proxy_read_timeout     300s;
    proxy_send_timeout     300s;
    proxy_connect_timeout   10s;

    # Buferiai upload'ui – saugome į temp failą (ne RAM) dideliems failams
    client_body_buffer_size    1M;
    client_body_temp_path      /tmp/nginx_upload 1 2;

    # ── Root ir statiniai failai ───────────────────────────────────────────────
    root /opt/konradvault/frontend;
    index konradvault.html;

    # Statinių failų kešas (HTML/CSS/JS)
    location ~* \.(css|js|svg|ico|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Pagrindiniai puslapiai ─────────────────────────────────────────────────
    location = / {
        try_files /konradvault.html =404;
    }

    location = /konradvault.html {
        try_files $uri =404;
    }

    location = /dashboard.html {
        try_files $uri =404;
    }

    location = /admin.html {
        try_files $uri =404;
    }

    # ── Share puslapis: /share/{token} → share.html ───────────────────────────
    # Frontend JS nuskaito token'ą iš URL path
    location ~ ^/share/[A-Za-z0-9_-]+$ {
        try_files /share.html =404;
    }

    # ── Auth endpoint'ai – griežtas rate limit (brute-force apsauga) ──────────
    # Login + 2FA + registracija – 5 r/s / IP, burst 10
    # Per griežta? Padidinkit burst arba rate aukščiau (limit_req_zone bloke)
    location ~ ^/api/auth/(login|verify-2fa|register|register/confirm)$ {
        limit_req zone=auth_limit burst=10 nodelay;
        # Po limito viršijimo grąžinti 429 (ne 503)
        limit_req_status 429;

        proxy_pass         http://konradvault_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_pass_header  Set-Cookie;
    }

    # ── API proxy → Uvicorn ───────────────────────────────────────────────────
    location /api/ {
        # Bendra API zona – švelnesnė (30 r/s / IP, burst 60)
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://konradvault_api;
        proxy_http_version 1.1;

        # Keepalive palaikymas
        proxy_set_header Connection "";

        # Originalios užklausos informacija Uvicorn'ui
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie'us perduodame be modifikacijų
        proxy_pass_header Set-Cookie;

        # Buffering išjungtas download/streaming endpoint'ams
        # (decrypt_file_streaming() grąžina chunks – nereikia buferio)
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Swagger UI (tik debug rėžime) ─────────────────────────────────────────
    location /docs {
        proxy_pass         http://konradvault_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass         http://konradvault_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Klaidos puslapiai ──────────────────────────────────────────────────────
    error_page 404              /konradvault.html;
    error_page 500 502 503 504  /konradvault.html;

    # ── Logai ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/konradvault_access.log;
    error_log  /var/log/nginx/konradvault_error.log warn;
}
