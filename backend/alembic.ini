# ============================================
# Alembic konfigūracijos failas
# ============================================
# Naudojimas:
#   alembic upgrade head          → pritaiko visas migracijas
#   alembic downgrade -1          → atšaukia paskutinę migraciją
#   alembic revision --autogenerate -m "aprasymas" → nauja migracija
#   alembic current               → dabartinė DB versija
#   alembic history               → visų migracijų sąrašas

[alembic]
# Migracijų scenarijų direktorija (reliatyvus kelias nuo šio failo)
script_location = migrations

# DB URL – bus perrašyta env.py iš app.config (čia tik fallback)
sqlalchemy.url = sqlite:///./konradvault.db

# Failo pavadinimo šablonas naujoms migracijoms
# %%(rev)s  → trumpas revizijos ID
# %%(slug)s → pavadinimas iš -m "..." parametro
file_template = %%(rev)s_%%(slug)s

# Timezone laiko žymėse
timezone = UTC

# ============================================
# Logging nustatymai (Alembic vidiniam loggingui)
# ============================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
